<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanner de Pneus</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    
    <div class="bg-white p-6 rounded-2xl shadow-lg max-w-sm w-full text-center">
        <h1 class="text-2xl font-bold text-gray-800 mb-2">Scanner de Pneus</h1>
        <p class="text-gray-500 text-sm mb-6">Faça o upload de uma foto nítida da banda de rodagem do seu pneu para analisarmos o nível de desgaste com base no TWI.</p>

        <div class="mb-4">
            <label for="file-upload" class="cursor-pointer bg-blue-50 hover:bg-blue-100 text-blue-600 font-semibold py-3 px-4 rounded-lg border-2 border-blue-200 border-dashed block w-full transition">
                Selecionar Imagem
            </label>
            <input id="file-upload" type="file" accept="image/*" class="hidden" onchange="previewImage(event)" />
        </div>

        <div id="preview-container" class="hidden mb-6">
            <img id="image-preview" src="#" alt="Preview do Pneu" class="w-full h-auto rounded-lg object-cover max-h-64 border border-gray-200" />
        </div>

        <button disabled class="w-full bg-gray-300 text-gray-500 font-semibold py-3 px-4 rounded-lg cursor-not-allowed">
            Analisar Desgaste (Backend na Sprint 2)
        </button>
    </div>

    <script>
        function previewImage(event) {
            const input = event.target;
            const previewContainer = document.getElementById('preview-container');
            const imagePreview = document.getElementById('image-preview');

            if (input.files && input.files[0]) {
                const reader = new FileReader();

                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    previewContainer.classList.remove('hidden'); // Mostra a div do preview
                }

                reader.readAsDataURL(input.files[0]);
            }
        }
    </script>
</body>
</html>
